<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5536162787317617"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100x100 Cloud Canvas (IP Quota & Voting)</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body {
            background-color: #1e1e24; color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box;
            user-select: none;
        }
        h1 { margin: 10px 0 5px 0; font-size: 24px; text-align: center; }
        #status { margin-bottom: 5px; font-weight: bold; color: #feca57; font-size: 14px; text-align: center; }
        #ipInfo { margin-bottom: 15px; font-size: 12px; color: #b2bec3; text-align: center; }
        
        canvas {
            width: 100%; max-width: 500px;
            aspect-ratio: 1 / 1; height: auto;
            background-color: #ffffff;
            image-rendering: pixelated;
            border: 4px solid #636e72;
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            touch-action: none; cursor: crosshair;
            transition: opacity 0.3s ease;
        }

        /* Class applied when offline to prevent drawing */
        .disabled-ui {
            opacity: 0.4;
            pointer-events: none; /* Disables all clicking/dragging */
            cursor: not-allowed;
            filter: grayscale(80%);
        }

        .ui-panel {
            margin-top: 20px; 
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            background: #2d3436; padding: 15px; border-radius: 8px;
            border: 2px solid #636e72;
            width: 100%; max-width: 400px; box-sizing: border-box;
        }
        .color-row {
            display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: bold;
        }
        input[type="color"] {
            border: 2px solid #fff; width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; padding: 0; background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
        input[type="color"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .stats { font-size: 18px; font-weight: bold; }
        .pixel-count { color: #00d2d3; font-size: 26px; }
        .warning { color: #ff7675; font-size: 16px; font-weight: bold; margin-top: 10px; min-height: 20px; text-align: center;}
        
        .vote-section {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            margin-top: 10px; width: 100%; border-top: 1px solid #636e72; padding-top: 15px;
        }
        .vote-btn {
            background-color: #d63031; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer;
            transition: background-color 0.2s;
        }
        .vote-btn:hover { background-color: #ff7675; }
        .vote-btn:disabled { background-color: #636e72; cursor: not-allowed; opacity: 0.7; }
        .vote-count { font-size: 14px; color: #ffeaa7; }
    </style>
</head>
<body>

    <h1>Global Cloud Grid</h1>
    <div id="status">Fetching IP & Connecting...</div>
    <div id="ipInfo"></div>
    
    <!-- Added disabled class initially -->
    <canvas id="pixelCanvas" class="disabled-ui" width="100" height="100"></canvas>

    <div class="ui-panel">
        <div class="stats">
            Pixels Available: <span id="pixelCount" class="pixel-count">30</span> / 30
        </div>
        <div class="color-row">
            <label>Select Color:</label>
            <input type="color" id="colorPicker" value="#000000" disabled>
        </div>
        
        <div class="vote-section">
            <button id="voteBtn" class="vote-btn" onclick="castVote()" disabled>Vote to Clear Board</button>
            <div id="voteCountText" class="vote-count">Votes: 0 / 10</div>
        </div>
    </div>
    
    <div id="warning" class="warning"></div>

    <script>
        const cloudTopic = 'global-pixel-canvas-100x100-public-v6'; 
        const votesTopic = 'global-pixel-canvas-votes-v6';
        let quotaTopic = '';
        let client = null;
        let myIp = '';
        let isConnected = false; // Tracks actual server connection

        const canvas = document.getElementById('pixelCanvas');
        const colorPicker = document.getElementById('colorPicker');
        const voteBtn = document.getElementById('voteBtn');
        const statusText = document.getElementById('status');
        const ctx = canvas.getContext('2d');
        const pixelCountText = document.getElementById('pixelCount');
        const warningText = document.getElementById('warning');
        
        const MAX_PIXELS = 30;
        let localGrid = {}; 
        let votes = {}; 
        
        let basePixels = MAX_PIXELS;
        let baseTime = Date.now();
        let currentPixelsLeft = MAX_PIXELS;

        let isDrawing = false;
        let lastDrawnX = -1;
        let lastDrawnY = -1;
        let needsSync = false;
        let unackedPixels = {};
        let clearUnackedTimeout = null;

        // --- MANAGE UI STATE BASED ON CONNECTION ---
        function setConnectionState(online) {
            isConnected = online;
            if (online) {
                statusText.innerText = "Connected to Cloud! (Live)";
                statusText.style.color = "#00b894";
                canvas.classList.remove('disabled-ui');
                colorPicker.disabled = false;
                updateVoteUI(); // Re-enable vote button if they haven't voted
            } else {
                statusText.innerText = "Offline - Reconnecting...";
                statusText.style.color = "#ff7675";
                canvas.classList.add('disabled-ui');
                colorPicker.disabled = true;
                voteBtn.disabled = true;
            }
        }

        // --- INITIALIZATION & IP FETCH ---
        async function init() {
            let displayIp = 'Unknown IP';
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                displayIp = data.ip;
                myIp = data.ip.replace(/[^a-zA-Z0-9]/g, '-');
            } catch(e) {
                console.warn("Could not fetch IP, using fallback");
                myIp = 'fallback-' + Math.floor(Math.random() * 100000);
            }

            document.getElementById('ipInfo').innerText = `Your IP: ${displayIp} (Quota & Votes tied to IP)`;
            quotaTopic = `global-pixel-canvas-quota-v6/${myIp}`;

            client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

            // Handle connection states
            client.on('connect', () => {
                setConnectionState(true);
                client.subscribe(cloudTopic);
                client.subscribe(quotaTopic);
                client.subscribe(votesTopic); 
            });

            client.on('offline', () => setConnectionState(false));
            client.on('reconnect', () => setConnectionState(false));
            client.on('close', () => setConnectionState(false));
            client.on('error', () => setConnectionState(false));

            client.on('message', (topic, message) => {
                if (topic === cloudTopic) {
                    try {
                        let incomingGrid = JSON.parse(message.toString());
                        localGrid = { ...incomingGrid, ...unackedPixels };
                        renderCanvas();
                    } catch(e) { console.error("Error loading cloud data"); }
                } else if (topic === quotaTopic) {
                    try {
                        let data = JSON.parse(message.toString());
                        basePixels = data.basePixels;
                        baseTime = data.baseTime;
                        calculatePixels();
                    } catch(e) { console.error("Error loading quota data"); }
                } else if (topic === votesTopic) {
                    try {
                        votes = JSON.parse(message.toString());
                        updateVoteUI();
                        
                        if (Object.keys(votes).length >= 10) {
                            localGrid = {};
                            unackedPixels = {};
                            renderCanvas();
                        }
                    } catch(e) { console.error("Error loading votes data"); }
                }
            });
        }

        // --- VOTING LOGIC ---
        function updateVoteUI() {
            if (!isConnected) return; // Don't update if offline

            const count = Object.keys(votes).length;
            document.getElementById('voteCountText').innerText = `Votes: ${count} / 10`;
            
            if (votes[myIp]) {
                voteBtn.disabled = true;
                voteBtn.innerText = "Voted";
            } else {
                voteBtn.disabled = false;
                voteBtn.innerText = "Vote to Clear Board";
            }
        }

        function castVote() {
            if (!isConnected || !myIp || votes[myIp]) return;
            
            votes[myIp] = true;
            const count = Object.keys(votes).length;
            
            if (count >= 10) {
                client.publish(cloudTopic, JSON.stringify({}), { retain: true });
                client.publish(votesTopic, JSON.stringify({}), { retain: true });
                
                localGrid = {};
                unackedPixels = {};
                renderCanvas();
            } else {
                client.publish(votesTopic, JSON.stringify(votes), { retain: true });
            }
            
            updateVoteUI();
        }

        // --- PIXEL QUOTA LOGIC ---
        function calculatePixels() {
            let secondsPassed = Math.floor((Date.now() - baseTime) / 1000);
            currentPixelsLeft = Math.min(MAX_PIXELS, basePixels + Math.floor(secondsPassed / 3));
            pixelCountText.innerText = currentPixelsLeft;
        }

        setInterval(calculatePixels, 1000);

        // Batch Syncing Server Logic (Now strictly requires connection)
        setInterval(() => {
            if (needsSync && client && isConnected) {
                client.publish(cloudTopic, JSON.stringify(localGrid), { retain: true });
                needsSync = false;
            }
        }, 500); 

        // --- DRAWING LOGIC ---
        function renderCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let coord in localGrid) {
                let parts = coord.split(',');
                ctx.fillStyle = localGrid[coord];
                ctx.fillRect(parseInt(parts[0]), parseInt(parts[1]), 1, 1);
            }
        }

        function getLinePixels(x0, y0, x1, y1) {
            let pixels = [];
            let dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
            let sx = (x0 < x1) ? 1 : -1, sy = (y0 < y1) ? 1 : -1;
            let err = dx - dy;

            while (true) {
                pixels.push({x: x0, y: y0});
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
            return pixels;
        }

        function handleDraw(e) {
            if (!isDrawing || !isConnected) return; // Prevent completely if offline

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);

            if (x < 0 || x >= 100 || y < 0 || y >= 100) return;

            const color = colorPicker.value;
            let pointsToDraw = [];

            if (lastDrawnX === -1) {
                pointsToDraw.push({x, y});
            } else {
                pointsToDraw = getLinePixels(lastDrawnX, lastDrawnY, x, y);
            }

            let modified = false;
            let quotaModified = false;

            for (let pt of pointsToDraw) {
                calculatePixels(); 
                if (currentPixelsLeft <= 0) {
                    warningText.innerText = "Out of pixels! Wait to regenerate.";
                    setTimeout(() => warningText.innerText = "", 2000);
                    break;
                }

                let key = `${pt.x},${pt.y}`;
                if (localGrid[key] !== color) {
                    localGrid[key] = color;
                    unackedPixels[key] = color;
                    
                    currentPixelsLeft--;
                    basePixels = currentPixelsLeft;
                    baseTime = Date.now();
                    
                    modified = true;
                    quotaModified = true;
                }
            }

            lastDrawnX = x;
            lastDrawnY = y;

            if (modified) {
                renderCanvas();
                needsSync = true;
            }
            
            if (quotaModified && client && isConnected) {
                client.publish(quotaTopic, JSON.stringify({ basePixels, baseTime }), { retain: true });
            }
        }

        // --- TOUCH & MOUSE EVENTS ---
        canvas.addEventListener('pointerdown', (e) => {
            if (!isConnected) return;
            isDrawing = true;
            if (clearUnackedTimeout) clearTimeout(clearUnackedTimeout);
            handleDraw(e);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isConnected) return;
            handleDraw(e);
        });

        const stopDrawing = () => {
            if (!isDrawing) return;
            isDrawing = false;
            lastDrawnX = -1;
            lastDrawnY = -1;
            
            if (needsSync && client && isConnected) {
                client.publish(cloudTopic, JSON.stringify(localGrid), { retain: true });
                needsSync = false;
            }
            
            if (clearUnackedTimeout) clearTimeout(clearUnackedTimeout);
            clearUnackedTimeout = setTimeout(() => {
                unackedPixels = {};
            }, 2000);
        };

        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointerleave', stopDrawing);
        canvas.addEventListener('pointercancel', stopDrawing);
        
        // Start the app
        init();
    </script>
</body>
</html>
